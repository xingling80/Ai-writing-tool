<!-- Codex-style popup toggle + AI model selector scripts -->
<script>
(function() {
  // --- Creator Profile Popup ---
  var creatorTrigger = document.getElementById('creator-profile-trigger');
  var creatorPopup = document.getElementById('creator-popup');
  if (creatorTrigger && creatorPopup) {
    creatorTrigger.addEventListener('click', function(e) {
      e.stopPropagation();
      creatorPopup.classList.toggle('hidden');
      // Close model popup if open
      if (modelPopup) modelPopup.classList.add('hidden');
      if (apiPanel) apiPanel.classList.add('hidden');
    });
  }

  // --- AI Model Selector Popup ---
  var modelTrigger = document.getElementById('ai-model-trigger');
  var modelPopup = document.getElementById('ai-model-popup');
  var modelNameEl = document.getElementById('ai-model-name');
  var addApiTrigger = document.getElementById('add-api-trigger');
  var apiPanel = document.getElementById('add-api-panel');
  var closeApiPanel = document.getElementById('close-api-panel');

  if (modelTrigger && modelPopup) {
    modelTrigger.addEventListener('click', function(e) {
      e.stopPropagation();
      modelPopup.classList.toggle('hidden');
      // Close creator popup if open
      if (creatorPopup) creatorPopup.classList.add('hidden');
      if (apiPanel) apiPanel.classList.add('hidden');
    });

    // Model option selection
    var options = modelPopup.querySelectorAll('.ai-model-option');
    options.forEach(function(opt) {
      opt.addEventListener('click', function(e) {
        e.stopPropagation();
        var name = opt.getAttribute('data-model');
        if (name && modelNameEl) modelNameEl.textContent = name;
        // Update visual: clear all active states
        options.forEach(function(o) {
          o.style.background = 'transparent';
          // Remove check icon
          var check = o.querySelector('img[alt=""]');
          if (check && check.closest('.ai-model-option') !== opt) {
            check.parentNode.removeChild(check);
          }
        });
        // Set active on clicked
        opt.style.background = 'var(--bg-overlay-l1)';
        modelPopup.classList.add('hidden');
      });
    });
  }

  // --- Add API Sub-panel ---
  if (addApiTrigger && apiPanel) {
    addApiTrigger.addEventListener('click', function(e) {
      e.stopPropagation();
      apiPanel.classList.toggle('hidden');
    });
  }
  if (closeApiPanel && apiPanel) {
    closeApiPanel.addEventListener('click', function(e) {
      e.stopPropagation();
      apiPanel.classList.add('hidden');
    });
  }

  // --- Close all popups on outside click ---
  document.addEventListener('click', function(e) {
    if (creatorPopup && !creatorTrigger.contains(e.target) && !creatorPopup.contains(e.target)) {
      creatorPopup.classList.add('hidden');
    }
    if (modelPopup && !modelTrigger.contains(e.target) && !modelPopup.contains(e.target) && !apiPanel.contains(e.target)) {
      modelPopup.classList.add('hidden');
    }
    if (apiPanel && !apiPanel.contains(e.target) && !addApiTrigger.contains(e.target)) {
      apiPanel.classList.add('hidden');
    }
  });
})();
</script>
